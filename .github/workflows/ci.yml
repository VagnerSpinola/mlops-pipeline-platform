name: ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports and syntax
        run: |
          python -m compileall app src pipelines orchestration mlops scripts tests
          python - <<'PY'
          import app.main
          import pipelines.training_pipeline
          import orchestration.prefect.flows.training_flow
          print('imports-ok')
          PY

      - name: Run test suite
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infrastructure/docker/Dockerfile -t mlops-pipeline-platform:ci .